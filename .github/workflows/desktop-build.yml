name: Desktop Build

on:
  workflow_dispatch:
    inputs:
      target:
        description: Platform to build
        required: true
        default: linux-x64
        type: choice
        options:
          - linux-x64
          - macos-arm64
          - macos-x64
          - windows-x64
          - all
      publish:
        description: Publish as a fork prerelease for automatic updates
        required: true
        default: false
        type: boolean
  workflow_call:
    inputs:
      target:
        type: string
        default: all
      publish:
        type: boolean
        default: true
      upstream_tag:
        type: string
        required: false
      upstream_url:
        type: string
        required: false

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.build.outputs.matrix }}
      version: ${{ steps.build.outputs.version }}
      tag: ${{ steps.build.outputs.tag }}
      ref: ${{ steps.build.outputs.ref }}
    steps:
      - uses: actions/checkout@v6
        with:
          repository: zepi2509/t3code
          ref: main
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: package.json
          cache: true
          run-install: |
            args:
              - --filter=@t3tools/scripts...
      - id: build
        shell: bash
        run: |
          all='[{"id":"linux-x64","runner":"ubuntu-24.04","platform":"linux","target":"AppImage","arch":"x64"},{"id":"macos-arm64","runner":"macos-26","platform":"mac","target":"dmg","arch":"arm64"},{"id":"macos-x64","runner":"macos-26","platform":"mac","target":"dmg","arch":"x64"},{"id":"windows-x64","runner":"windows-2025","platform":"win","target":"nsis","arch":"x64"}]'
          if [[ "${{ inputs.target }}" == "all" ]]; then
            matrix="$all"
          else
            matrix="$(node -e 'const builds=JSON.parse(process.argv[1]); console.log(JSON.stringify(builds.filter(({id}) => id === process.argv[2])))' "$all" "${{ inputs.target }}")"
          fi
          source_ref="$(git rev-parse HEAD)"
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "ref=$source_ref" >> "$GITHUB_OUTPUT"
          if [[ -n "${{ inputs.upstream_tag }}" ]]; then
            version="${{ inputs.upstream_tag }}"
            version="${version#v}"
            echo "version=$version" >> "$GITHUB_OUTPUT"
            echo "tag=v$version" >> "$GITHUB_OUTPUT"
          else
            date="$(node -p "new Date().toISOString().slice(0, 10).replaceAll('-', '')")"
            node scripts/resolve-nightly-release.ts \
              --date "$date" \
              --run-number "$GITHUB_RUN_NUMBER" \
              --sha "$source_ref" \
              --github-output
          fi

  build_wsl_node_pty:
    name: Build WSL node-pty (linux-x64)
    needs: prepare
    if: inputs.target == 'all' || inputs.target == 'windows-x64'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          repository: zepi2509/t3code
          ref: ${{ needs.prepare.outputs.ref }}
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: package.json
          cache: true
          run-install: true
      - name: Build Linux prebuild
        shell: bash
        run: |
          set -euo pipefail
          pty_pkg="$(node -e "console.log(require.resolve('node-pty/package.json', { paths: ['$GITHUB_WORKSPACE/apps/server'] }))")"
          pty_dir="$(dirname "$pty_pkg")"
          (cd "$pty_dir" && npx --yes node-gyp rebuild)
          mkdir -p wsl-prebuild
          cp "$pty_dir/build/Release/pty.node" wsl-prebuild/pty.node
          file wsl-prebuild/pty.node
      - uses: actions/upload-artifact@v7
        with:
          name: wsl-node-pty-x64
          path: wsl-prebuild/pty.node
          if-no-files-found: error

  build:
    needs: [prepare, build_wsl_node_pty]
    if: ${{ !cancelled() && needs.prepare.result == 'success' }}
    name: Build ${{ matrix.id }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
        with:
          repository: zepi2509/t3code
          ref: ${{ needs.prepare.outputs.ref }}

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: package.json
          cache: true
          run-install: true

      - name: Align package versions
        run: node scripts/update-release-package-versions.ts "${{ needs.prepare.outputs.version }}"

      - name: Download WSL node-pty prebuild
        if: matrix.platform == 'win'
        uses: actions/download-artifact@v7
        with:
          name: wsl-node-pty-x64
          path: wsl-prebuild

      - name: Install ImageMagick
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick

      - name: Build desktop artifact
        shell: bash
        env:
          T3CODE_DESKTOP_UPDATE_REPOSITORY: ${{ github.repository }}
        run: |
          args=(
            --platform "${{ matrix.platform }}"
            --target "${{ matrix.target }}"
            --arch "${{ matrix.arch }}"
            --build-version "${{ needs.prepare.outputs.version }}"
            --verbose
          )
          if [[ "${{ matrix.platform }}" == "win" ]]; then
            args+=(--wsl-prebuild "$GITHUB_WORKSPACE/wsl-prebuild/pty.node")
          fi
          vp run dist:desktop:artifact "${args[@]}"

      - name: Disambiguate Intel macOS update manifest
        if: matrix.id == 'macos-x64'
        shell: bash
        run: |
          for manifest in release/*-mac.yml; do
            mv "$manifest" "${manifest%.yml}-x64.yml"
          done

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v7
        with:
          name: desktop-${{ matrix.id }}
          path: release/*
          if-no-files-found: error
          retention-days: 14

  publish:
    if: inputs.publish
    needs: [prepare, build]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          repository: zepi2509/t3code
          ref: ${{ needs.prepare.outputs.ref }}
      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: package.json
          cache: true
          run-install: |
            args:
              - --filter=@t3tools/scripts...
      - uses: actions/download-artifact@v8
        with:
          pattern: desktop-*
          merge-multiple: true
          path: release

      - name: Merge macOS update manifests
        shell: bash
        run: |
          for x64_manifest in release/*-mac-x64.yml; do
            arm64_manifest="${x64_manifest%-x64.yml}.yml"
            if [[ -f "$arm64_manifest" ]]; then
              node scripts/merge-update-manifests.ts --platform mac "$arm64_manifest" "$x64_manifest"
              rm "$x64_manifest"
            fi
          done

      - name: Publish fork prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          target_commitish: ${{ needs.prepare.outputs.ref }}
          name: T3 Code fork build based on ${{ inputs.upstream_tag || needs.prepare.outputs.version }}
          body: >-
            ${{ inputs.upstream_url && format('Based on upstream release: {0}', inputs.upstream_url) || 'Manual fork desktop build.' }}
          prerelease: true
          make_latest: false
          files: release/*
          fail_on_unmatched_files: true
