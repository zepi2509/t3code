name: Desktop Build

on:
  workflow_dispatch:
    inputs:
      target:
        description: Platform to build
        required: true
        default: linux-x64
        type: choice
        options:
          - linux-x64
          - macos-arm64
          - macos-x64
          - windows-x64
      publish:
        description: Publish as a fork prerelease for automatic updates
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ inputs.target }}
    runs-on: ${{ startsWith(inputs.target, 'macos-') && 'macos-26' || inputs.target == 'windows-x64' && 'windows-2025' || 'ubuntu-24.04' }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: package.json
          cache: true
          run-install: true

      - name: Install ImageMagick
        if: inputs.target == 'linux-x64'
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick

      - id: release
        name: Resolve fork build version
        shell: bash
        run: |
          base_version="$(node -p "require('./apps/desktop/package.json').version")"
          date="$(node -p "new Date().toISOString().slice(0, 10).replaceAll('-', '')")"
          version="${base_version}-nightly.${date}.${GITHUB_RUN_NUMBER}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Build unsigned desktop artifact
        shell: bash
        env:
          T3CODE_DESKTOP_UPDATE_REPOSITORY: ${{ github.repository }}
        run: |
          case "${{ inputs.target }}" in
            linux-x64) platform=linux; target=AppImage; arch=x64 ;;
            macos-arm64) platform=mac; target=dmg; arch=arm64 ;;
            macos-x64) platform=mac; target=dmg; arch=x64 ;;
            windows-x64) platform=win; target=nsis; arch=x64 ;;
          esac
          vp run dist:desktop:artifact \
            --platform "$platform" \
            --target "$target" \
            --arch "$arch" \
            --build-version "${{ steps.release.outputs.version }}"

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v7
        with:
          name: desktop-${{ inputs.target }}
          path: release/*
          if-no-files-found: error
          retention-days: 14

      - name: Publish fork prerelease
        if: inputs.publish
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: T3 Code fork build ${{ steps.release.outputs.version }}
          prerelease: true
          make_latest: false
          generate_release_notes: true
          files: release/*
          fail_on_unmatched_files: true
