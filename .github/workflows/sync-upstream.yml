name: Sync upstream

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-upstream

jobs:
  sync:
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.sync.outputs.ref }}
      releases: ${{ steps.release.outputs.releases || '[]' }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: sync
        name: Merge upstream main
        run: |
          base_ref="$(git rev-parse HEAD)"
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git remote add upstream https://github.com/pingdotgg/t3code.git
          git fetch upstream main
          git merge --no-edit upstream/main
          if ! git diff --quiet "$base_ref" -- .github/workflows; then
            git restore --source="$base_ref" --staged --worktree .github/workflows
            git commit -m "chore(ci): preserve fork workflows"
          fi
          sync_ref="$(git rev-parse HEAD)"
          git push origin HEAD:main
          echo "ref=$sync_ref" >> "$GITHUB_OUTPUT"

      - id: release
        name: Find new upstream releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api 'repos/pingdotgg/t3code/releases?per_page=10' > upstream-releases.json
          gh api 'repos/${{ github.repository }}/releases?per_page=100' > fork-releases.json
          releases="$(jq -cn --slurpfile upstream upstream-releases.json --slurpfile fork fork-releases.json '
            $upstream[0]
            | [ .[]
                | select(.draft | not)
                | . as $release
                | select($fork[0] | any(
                    .name == ("T3 Code fork build based on " + $release.tag_name)
                    or .body == ("Based on upstream release: " + $release.html_url)
                  ) | not)
                | {upstream_tag: .tag_name, upstream_url: .html_url}
              ]
            | reverse
          ')"
          echo "releases=$releases" >> "$GITHUB_OUTPUT"

  desktop_release:
    needs: sync
    if: ${{ needs.sync.result == 'success' && needs.sync.outputs.releases != '[]' }}
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        release: ${{ fromJSON(needs.sync.outputs.releases) }}
    uses: ./.github/workflows/desktop-build.yml
    with:
      ref: ${{ needs.sync.outputs.ref }}
      target: all
      publish: true
      upstream_tag: ${{ matrix.release.upstream_tag }}
      upstream_url: ${{ matrix.release.upstream_url }}
