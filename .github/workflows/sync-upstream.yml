name: Sync upstream

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-upstream

jobs:
  sync:
    runs-on: ubuntu-latest
    outputs:
      build_release: ${{ steps.release.outputs.build_release }}
      upstream_tag: ${{ steps.release.outputs.upstream_tag }}
      upstream_url: ${{ steps.release.outputs.upstream_url }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Merge upstream main
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git remote add upstream https://github.com/pingdotgg/t3code.git
          git fetch upstream main
          git merge --no-edit upstream/main

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: package.json
          cache: true
          run-install: true

      - name: Sync vendored reference repos
        run: node scripts/sync-reference-repos.ts

      - name: Commit vendored repo sync
        shell: bash
        run: |
          if git diff --quiet -- .repos; then
            exit 0
          fi
          git add .repos
          git commit -m "chore: sync vendored reference repos"

      - name: Push updated main
        run: git push origin HEAD:main

      - id: release
        name: Find new upstream release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          upstream_tag="$(gh api 'repos/pingdotgg/t3code/releases?per_page=10' --jq 'map(select(.draft | not))[0].tag_name')"
          upstream_url="$(gh api 'repos/pingdotgg/t3code/releases?per_page=10' --jq 'map(select(.draft | not))[0].html_url')"
          release_name="T3 Code fork build based on $upstream_tag"
          if gh release list --limit 100 --json name --jq '.[].name' | grep -Fxq "$release_name"; then
            build_release=false
          else
            build_release=true
          fi
          echo "build_release=$build_release" >> "$GITHUB_OUTPUT"
          echo "upstream_tag=$upstream_tag" >> "$GITHUB_OUTPUT"
          echo "upstream_url=$upstream_url" >> "$GITHUB_OUTPUT"

  desktop_release:
    needs: sync
    if: needs.sync.outputs.build_release == 'true'
    uses: ./.github/workflows/desktop-build.yml
    with:
      target: all
      publish: true
      upstream_tag: ${{ needs.sync.outputs.upstream_tag }}
      upstream_url: ${{ needs.sync.outputs.upstream_url }}
