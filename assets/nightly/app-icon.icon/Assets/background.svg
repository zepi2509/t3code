<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="night" x1="12" y1="6" x2="116" y2="124" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07152F"/>
      <stop offset="0.5" stop-color="#151443"/>
      <stop offset="1" stop-color="#32155B"/>
    </linearGradient>
    <radialGradient id="skyGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(90 28) rotate(137) scale(78 70)">
      <stop stop-color="#5165D8" stop-opacity="0.4"/>
